# K8s Deployment YAML — intentionally broken for validation test
apiVersion: apps/v1
kind: Deploymentt          # typo in kind
metadata:
  Name: my-api-service    # wrong: key must be lowercase 'name'
  namespace: Production   # wrong: namespaces are lowercase
  labels:
    app: my-api
    version: 1.2.3
    env: production

spec:
  replicas: "three"       # wrong type: must be integer, not string
  selector:
    matchLabels:
      app: my-api
      # missing 'version' label that's in template labels (selector/template label mismatch)

  strategy:
    type: BlueGreen       # invalid: must be RollingUpdate or Recreate

  template:
    metadata:
      labels:
        app: my-api
        version: 1.2.3

    spec:
      restartPolicy: OnFailure   # invalid for Deployment: must be Always

      containers:
        - name: My_API_Container  # invalid: uppercase + underscore not allowed
          image: ""               # empty image is invalid
          imagePullPolicy: always # wrong case: must be Always/IfNotPresent/Never

          ports:
            - containerPort: 99999   # invalid: max is 65535
              protocol: HTTP         # invalid: must be TCP/UDP/SCTP

          env:
            - name: DATABASE_URL
              value: postgres://user:pass@db:5432/mydb
            - name: LOG_LEVEL
              # missing value and no valueFrom — empty env var

          resources:
            requests:
              cpu: "500m"
              memory: "128Mi"
              gpu: "1"            # unknown field (additionalProperties: false)
            limits:
              cpu: "0"            # invalid: 0 CPU limit
              memory: "64Mi"      # limit < request — not caught by schema but semantically wrong

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: -5  # invalid: cannot be negative

        # Second container missing required 'image' field
        - name: sidecar-proxy

  unknownTopLevelField: true    # extra field not in schema
