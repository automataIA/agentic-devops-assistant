{% if is_error %}
<div class="alert alert-error py-1.5 px-3 text-xs font-mono rounded-lg">
  <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <span>{{ message }}</span>
</div>
{% else %}
<div class="alert alert-success py-1.5 px-3 text-xs font-mono rounded-lg">
  <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span>{{ message }}</span>
</div>
{% endif %}
